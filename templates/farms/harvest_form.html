{% extends 'base.html' %}
{% block content %}
<div class="form-card">
  <h1 class="form-title">Add Harvest for {{ farm.farm_name }}</h1>
  <form method="post">
    <div class="form-grid">
      <div class="form-group">
        <label>Harvest Date</label>
        <input name="harvest_date" type="date" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Total Output (kg)</label>
        <input name="total_output_kg" type="number" step="0.01" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Quality Grade</label>
        <input name="quality_grade" class="form-control" placeholder="e.g., Grade A">
      </div>
      <div class="form-group">
        <label>Rate per kg (₹)</label>
        <input name="rate_per_kg" type="number" step="0.01" class="form-control" required>
      </div>
      <div class="form-group full">
        <label>Notes</label>
        <textarea name="notes" class="form-control" placeholder="Additional notes about this harvest..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Harvest</button>
      <a class="btn btn-outline" href="{{ url_for('farm_detail', id=farm.id) }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
