<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register - Eco Farms</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <header class="auth-header">
        <h1>Create Account</h1>
        <p>Register to manage farms and farmers with Eco Farms.</p>
      </header>
      <div class="card-body">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ 'success' if category == 'success' else 'error' }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="post">
          <div class="form-group"><label>Username</label><input type="text" name="username" required autofocus></div>
          <div class="form-group"><label>Full Name</label><input type="text" name="full_name"></div>
          <div class="form-group"><label>Email</label><input type="email" name="email"></div>
          <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
          <div class="form-group"><label>Confirm Password</label><input type="password" name="password_confirm" required></div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Create Account</button>
          </div>
        </form>
        <p class="auth-note">Already registered? <a href="{{ url_for('login') }}">Sign in</a>.</p>
      </div>
    </div>
  </div>
</body>
</html>
