{% extends 'base.html' %}
{% block content %}
<div class="form-card">
  <h1 class="form-title">Add Seed for {{ farm.farm_name }}</h1>
  <form method="post">
    <div class="form-grid">
      <div class="form-group">
        <label>Seed Name</label>
        <input name="seed_name" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Variety</label>
        <input name="variety" class="form-control" placeholder="e.g., Pusa Basmati">
      </div>
      <div class="form-group">
        <label>Quantity (kg)</label>
        <input name="quantity_kg" type="number" step="0.01" class="form-control">
      </div>
      <div class="form-group">
        <label>Sow Date</label>
        <input name="sow_date" type="date" class="form-control">
      </div>
      <div class="form-group full">
        <label>Notes</label>
        <textarea name="notes" class="form-control" placeholder="Additional notes about seeds..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Seed</button>
      <a class="btn btn-outline" href="{{ url_for('farm_detail', id=farm.id) }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
